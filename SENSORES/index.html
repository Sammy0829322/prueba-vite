<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensores OASIS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Changa+One:ital@0;1&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./style,.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
  <div class="container">
    <div class="box-one">
      <div class="titulo">
        <h1>SENSORES O.A.S.I.S</h1>
      </div>

    </div>
    <div class="box-two">
      <header>

        <div class="ip">
          <h3>Escribe la direccion IP</h3>
          <input type="text" id="ip-input" placeholder="Direccion IP" value="192.168.3.3">
        </div>
        <div class="btn-conectado">
          <button id="btn-conectar">Conectar</button>
          <button id="btn-desconectar">Desconectar</button>
          <button id="btn-reconectar">Reconectar</button>
        </div>

        <div class="botones-conectados">
          <div class="estado">
            <h3>Estado:</h3>
            <p id="estado">Desconectado</p>
          </div>


      </header>
    </div>
    <div class="box">
      <div class="toggle-container">
        <div class="toggle">
          <input type="checkbox" id="btn-medicion">
          <label for="btn-medicion"></label>
        </div>
        <span class="toggle-label">Mediciones</span>
      </div>
    </div>
    <div class="box-four">
      <div class="chart-container">
        <canvas id="gasChart"></canvas>
      </div>
    </div>
    <div class="box">5</div>
    <div class="box-six">6</div>
    <div class="box-seven">7</div>
    <div class="box">8</div>

  </div>
  <script src="./app.js"></script>
</body>

</html>
