<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensores OASIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Changa+One:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Estilos para soportar las dos gráficas en el Box 7 sin romper el diseño */
        .box-seven .chart-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
            padding: 10px;
        }
        #gasChart, #heartChart {
            max-height: 48%; /* Ajuste para que quepan ambos canvas */
            background: rgba(0, 0, 0, 0.2);
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        
        <div class="box-one">
            <div class="titulo">
                <h1>SENSORES O.A.S.I.S</h1>
            </div>
        </div>

        <div class="box-two">
            <header>
                <div class="ip">
                    <h3>Escribe la dirección IP</h3>
                    <input type="text" id="ip-input" placeholder="Dirección IP" value="192.168.3.3">
                </div>
                <div class="btn-conectado">
                    <button id="btn-conectar">Conectar</button>
                    <button id="btn-desconectar">Desconectar</button>
                    <button id="btn-reconectar">Reconectar</button>
                </div>
                <div class="botones-conectados">
                    <div class="estado">
                        <h3>Estado:</h3>
                        <p id="estado">Desconectado</p>
                    </div>
                </div>
            </header>
        </div>

        <div class="box-three">
            <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-audio">
                    <label for="btn-audio"></label>
                </div>
                <span class="toggle-label">Micrófono</span>
            </div>
        </div>

        <div class="box-four">
            <div class="chart-container">
                <canvas id="audioCanvas"></canvas>
            </div>
        </div>

        <div class="box-nine">
              <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-radar"> 
                    <label for="btn-radar"></label>
                </div>
                <span class="toggle-label">Radar Humano</span>
            </div>
        </div>

        <div class="box box-radar" id="radar-container">
            <div class="radar-header">
                <h3>RADAR LD2410B</h3>
            </div>
            <div class="radar-body">
                <div class="radar-details">
                    <div class="radar-item status-item">
                        <span id="radar-status">OFF</span>
                    </div>
                    <div class="radar-item">
                        <span class="label">MOV:</span>
                        <span id="radar-dist-mov">--</span> cm
                        <small>(Ene: <span id="radar-ene-mov">0</span>)</small>
                    </div>
                    <div class="radar-item">
                        <span class="label">EST:</span>
                        <span id="radar-dist-est">--</span> cm
                        <small>(Ene: <span id="radar-ene-est">0</span>)</small>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="box-ten">
            <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-gas">
                    <label for="btn-gas"></label>
                </div>
                <span class="toggle-label">Sensor de Gas</span>
            </div>
        </div>

        <div class="box-seven">
            <div class="chart-container">
                <canvas id="gasChart"></canvas>
                <canvas id="heartChart"></canvas>
            </div>
        </div>
        
        <div class="box-six">6</div>
        <div class="box-eight">7</div>
        <div class="box-eleven">
            <div class="ppm-display">
                    <p id="ppm-value">0.00</p>
                    <h3>PPM</h3>
                </div>
        </div>
        <div class="box-twelve">9</div>

        <div class="box-thirteen">
    <div class="toggle-container">
        <div class="toggle">
            <input type="checkbox" id="btn-heart">
            <label for="btn-heart"></label>
        </div>
        <span class="toggle-label">Sensor Pulso</span>
    </div>
    <div style="text-align: center; margin-top: 10px; color: #00ffcc; font-family: 'Changa One';">
        <span style="font-size: 0.9rem; color: #aaa;">OXIGENACIÓN:</span><br>
        <span id="spo2-value" style="font-size: 1.8rem; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5);">--%</span>
    </div>
</div>

        <div class="box-fourteen">
            <img src="./assets/corazon.gif" alt="Corazón" width="100px">
            <h1 style="display: inline-block;"><span id="bpm-value">--</span></h1>
            <h3 style="display: inline-block;">BPM</h3>
            <p id="bpm-status" style="font-weight: bold; color: #aaa; text-transform: uppercase; font-size: 0.7rem; margin-top: 5px;">SISTEMA OFF</p>
        </div>

    </div>

    <script src="./app.js"></script>
</body>
</html>
