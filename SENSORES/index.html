<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensores OASIS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Changa+One:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">

        <div class="box-one">
            <div class="titulo">
                <h1>SENSORES O.A.S.I.S</h1>
            </div>
        </div>

        <div class="box-two">
            <header>
                <div class="ip">
                    <h3>Escribe la dirección IP</h3>
                    <input type="text" id="ip-input" placeholder="Dirección IP" value="192.168.3.3">
                </div>
                <div class="btn-conectado">
                    <button id="btn-conectar">Conectar</button>
                    <button id="btn-desconectar">Desconectar</button>
                    <button id="btn-reconectar">Reconectar</button>
                </div>
                <div class="botones-conectados">
                    <div class="estado">
                        <h3>Estado:</h3>
                        <p id="estado">Desconectado</p>
                    </div>
                </div>
            </header>
        </div>

        <div class="box-three">
            <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-audio">
                    <label for="btn-audio"></label>
                </div>
                <span class="toggle-label">Micrófono</span>
            </div>
        </div>

        <div class="box-four">
            <canvas id="audioCanvas"></canvas>
        </div>

        <div class="box-nine">
            <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-radar">
                    <label for="btn-radar"></label>
                </div>
                <span class="toggle-label">Radar Humano</span>
            </div>
        </div>

        <div class="box box-radar" id="radar-container">
            <div class="radar-header">
                <h3>RADAR LD2410B</h3>
            </div>
            <div class="radar-body">
                <div class="radar-details">
                    <div class="radar-item status-item">
                        <span id="radar-status">OFF</span>
                    </div>
                    <div class="radar-item">
                        <span class="label">MOV:</span>
                        <span id="radar-dist-mov">--</span> cm
                        <small>(Ene: <span id="radar-ene-mov">0</span>)</small>
                    </div>
                    <div class="radar-item">
                        <span class="label">EST:</span>
                        <span id="radar-dist-est">--</span> cm
                        <small>(Ene: <span id="radar-ene-est">0</span>)</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="box-ten">
            <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-gas">
                    <label for="btn-gas"></label>
                </div>
                <span class="toggle-label">Sensor de Gas</span>
            </div>
        </div>

        <div class="box-seven">
            <canvas id="gasChart"></canvas>

        </div>

        <div class="box-six">
            <div class="toggle-container">
                <div class="toggle">
                    <input type="checkbox" id="btn-heart">
                    <label for="btn-heart"></label>
                </div>
                <span class="toggle-label">Sensor Pulso</span>
            </div>
        </div>
        <div class="box-eight"> <canvas id="heartChart"></canvas></div>
        <div class="box-eleven">
            <div class="ppm-display">
                <h3>PPM</h3>
                <p id="ppm-value">0.00</p>
            </div>
        </div>
        <div class="box-twelve">9</div>

        <div class="box-thirteen">
            <div class="oxigenacion-display">
                <span class="oxigenacion-label">OXIGENACIÓN:</span><br>
                <span id="spo2-value">--%</span>
            </div>
        </div>

        <div class="box-fourteen">
            <!--  <img src="./assets/corazon.gif" alt="Corazón" width="100px"> -->
            <div class="bpm-display">
                <span class="bpm-label">BPM:</span><br>
                <span id="bpm-value">--</span>
            </div>
        </div>

    </div>s

    <script src="./app.js"></script>
</body>

</html>
